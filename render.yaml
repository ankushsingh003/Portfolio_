services:
  # Backend Web Service
  - type: web
    name: portfolio-backend
    env: python
    rootDir: backend  # Added this to fix the "requirements.txt not found" error
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  # Frontend Static Site
  - type: static
    name: portfolio-frontend
    env: static
    rootDir: frontend # Building from the frontend folder
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
